<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="url(#g)"/>
  <!-- Calendar icon (matches Navbar logo path, scaled to 32×32 canvas) -->
  <!-- Top pins -->
  <line x1="11" y1="5" x2="11" y2="9" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="21" y1="5" x2="21" y2="9" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Horizontal bar -->
  <line x1="7" y1="13" x2="25" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Calendar body -->
  <rect x="5" y="8" width="22" height="19" rx="3" stroke="white" stroke-width="2" fill="none"/>
</svg>